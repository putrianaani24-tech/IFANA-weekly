<html>
<head>
    <title>WEB INFORMATIKA C 2026</title>
    <link rel="stylesheet" href="assets/style.css">
</head>

<body class="mahasiswa">
    <header>
        <h1>WEB INFORMATIKA ANA 2026</h1>
    </header> 

    <nav>
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="contact.html">Contact</a>
        <a href="mahasiswa.html">Data Mahasiswa</a>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Tugas Input Data</h2>
            
            <form>
                <table border="0" cellpadding="10">
                    <tr>
                        <td>Nama</td>
                        <td>:</td>
                        <td><input type="text" name="nama"></td>
                    </tr>
                    <tr>
                        <td>NIM</td>
                        <td>:</td>
                        <td><input type="number" name="nim"></td>
                    </tr>
                    <tr>
                        <td>Email</td>
                        <td>:</td>
                        <td><input type="email" name="email"></td>
                    </tr>
                    <tr>
                        <td>Tanggal Lahir</td>
                        <td>:</td>
                        <td><input type="date" name="tgl_lahir"></td>
                    </tr>
                    <tr>
                        <td>Jenis Kelamin</td>
                        <td>:</td>
                        <td>
                            <input type="radio" name="jk"> Laki-laki
                            <input type="radio" name="jk"> Perempuan
                        </td>
                    </tr>
                    <tr>
                        <td>Jurusan</td>
                        <td>:</td>
                        <td>
                            <select name="jurusan">
                                <option>Teknik Informatika</option>
                                <option>Sistem Informasi</option>
                                <option>Manajemen Informatika</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="3" align="center">
                            <input type="submit" value="Kirim Data" style="padding: 10px 20px;">
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 Informatika
    </footer>
</body>
